<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Homeschool Planner</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="theme-color" content="#F5F4EC">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href='data:application/manifest+json,{"name":"Homeschool Planner","short_name":"Planner","display":"standalone","background_color":"%23F5F4EC","theme_color":"%23F5F4EC","start_url":"."}'>
<style>
/* ================================================================
   SECTION 0 — STYLES
   0.1 Design tokens   0.2 Base & layout   0.3 Components
   ================================================================ */

/* --- 0.1 Design tokens --- */
:root{
  --paper:#F5F4EC;          /* page background: soft warm paper */
  --card:#FFFFFF;           /* panels */
  --ink:#25302A;            /* primary text: green-black ink */
  --muted:#6E756D;          /* secondary text */
  --spruce:#3D5A49;         /* primary action */
  --spruce-dark:#2E4638;
  --spruce-soft:#E7EEE8;    /* tinted fills */
  --gold:#B8892F;           /* attention / unsaved */
  --madder:#A4553F;         /* destructive */
  --madder-soft:#F6E9E4;
  --line:#DCD8C8;           /* hairlines */
  --line-soft:#E9E6DA;
  --icon:#B8B6A8;           /* quiet action icons (mockup) */
  --pill-border:#C7C4B9;    /* thin outlined detail pills */
  --pill-text:#5F5E5A;
  --soft-ink:#8B8A80;       /* focus text, tiny grade labels */
  --neutral-pill:#F1EFE8;   /* neutral pill background */
  --radius:10px;
  --font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--font-ui);font-size:16px;line-height:1.5}
button{font-family:var(--font-ui)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* --- 0.2 Base & layout --- */
#app{max-width:880px;margin:0 auto;padding:0 16px 90px}
header.bookplate{padding:22px 4px 12px;border-bottom:1px solid var(--ink);position:relative}
header.bookplate::after{content:"";display:block;position:absolute;left:0;right:0;bottom:3px;border-bottom:1px solid var(--ink)}
.bp-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.bp-title{font-family:var(--font-display);font-size:26px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}

nav.tabs{display:flex;gap:4px;margin:16px 0 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
nav.tabs button{appearance:none;border:none;background:none;padding:10px 14px;font-size:15px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--spruce);font-weight:600}
nav.tabs button:hover{color:var(--ink)}

h2.screen-title{font-family:var(--font-display);font-size:22px;font-weight:600;margin:6px 0 4px}
p.screen-note{color:var(--muted);font-size:14px;margin-bottom:18px;max-width:60ch}
.eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}

/* --- 0.3 Components --- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card h3{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.stack{display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

label.field{display:flex;flex-direction:column;gap:5px;font-size:13.5px;font-weight:600;color:var(--ink)}
label.field span.hint{font-weight:400;color:var(--muted)}
input[type=text],input[type=number],input[type=date],select,textarea{
  font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#FDFCF8;color:var(--ink);min-height:44px;width:100%}
textarea{min-height:70px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--spruce);outline:none;box-shadow:0 0 0 3px var(--spruce-soft)}

.btn{appearance:none;border:1px solid var(--spruce);background:var(--spruce);color:#fff;font-size:15px;font-weight:600;
  padding:10px 16px;border-radius:8px;cursor:pointer;min-height:44px}
.btn:hover{background:var(--spruce-dark)}
.btn.secondary{background:var(--card);color:var(--spruce);border-color:var(--spruce)}
.btn.secondary:hover{background:var(--spruce-soft)}
.btn.quiet{background:none;border-color:var(--line);color:var(--muted);font-weight:500}
.btn.quiet:hover{color:var(--ink);border-color:var(--muted)}
.btn.danger{background:var(--card);color:var(--madder);border-color:var(--madder)}
.btn.danger:hover{background:var(--madder-soft)}
.btn.small{min-height:36px;padding:6px 12px;font-size:13.5px}
.btn:disabled{opacity:.5;cursor:default}

.list-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.list-item:last-child{border-bottom:none}
.color-dot{width:16px;height:16px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.15)}
.li-main{flex:1;min-width:160px}
.li-name{font-weight:600}
.li-sub{font-size:13px;color:var(--muted)}
.pill{display:inline-block;font-size:11px;font-weight:600;
  padding:2.5px 9px;border-radius:20px;background:var(--spruce-soft);color:var(--spruce-dark)}
.pill.gold{background:#F3EAD6;color:#8A6716}
.pill.gray{background:#ECEAE0;color:var(--muted)}
.pill.solid{background:var(--spruce);color:#E7EEE8}

.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0}
.swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}

.empty{padding:28px 10px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--font-display);font-size:16px}
.notice{background:var(--spruce-soft);border:1px solid #CBDACD;border-radius:var(--radius);padding:12px 14px;font-size:14px;margin-bottom:16px}
.notice.warn{background:#F7F0DE;border-color:#E4D3A6}
.mono{font-family:var(--font-mono);font-size:13px}
.kv{display:flex;gap:8px;font-size:14px}.kv b{min-width:110px;font-weight:600}
table.plain{width:100%;border-collapse:collapse;font-size:14px}
table.plain td,table.plain th{padding:8px 6px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:middle}
table.plain th{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:50;width:min(92vw,420px)}
.toast{background:var(--ink);color:#F5F4EC;padding:12px 16px;border-radius:10px;font-size:14.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);text-align:center}
.toast.warn{background:#7A5A1D}
.weekday-row{display:flex;gap:6px;flex-wrap:wrap}
.weekday-row label{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--muted);
  border:1px solid var(--line);border-radius:8px;padding:8px 0;width:44px;cursor:pointer;background:#FDFCF8}
.weekday-row label.on{background:var(--spruce-soft);border-color:var(--spruce);color:var(--spruce-dark)}
.weekday-row input{position:absolute;opacity:0}
details.adv{margin-top:8px}
.seq{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);min-width:52px;text-align:right;flex:none}
.week-head{margin:14px 0 2px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line-soft);padding-bottom:4px}
/* — the shared kit (restyle round): striped rows, serif names, pills, kid circles, icon buttons — */
.row-stack{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.srow{background:var(--card);display:flex;align-items:center;gap:12px;padding:11px 14px;border-left:4px solid var(--line)}
.srow .main{flex:1;min-width:0}
.sname{font-family:var(--font-display);font-size:17.5px;font-weight:700;color:var(--ink)}
.aname{font-family:var(--font-display);font-size:15.5px;font-weight:600;color:var(--ink)}
.name-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.subj-pill{font-size:10.5px;color:var(--pill-text);background:var(--neutral-pill);padding:2px 7px;border-radius:5px;font-weight:500;white-space:nowrap}
.focus-txt{font-size:12px;color:var(--soft-ink)}
.meta-line{font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:9px;flex-wrap:wrap}
.meta-line .mi{height:22px;display:inline-flex;align-items:center;gap:5px}
.type-ico{color:var(--soft-ink)} .type-ico svg{width:15px;height:15px}
.kidcol{display:flex;gap:5px;flex-shrink:0}   /* width set inline by courseMetaLine — one shared width, so the w/d pills line up across rows */
.kid{display:inline-flex;flex-direction:column;align-items:center;gap:1px}
.kid .cir{width:22px;height:22px;border-radius:50%;color:#FDFCF8;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center}
.kid .grd{font-size:8.5px;color:var(--soft-ink);font-weight:600;min-height:11px}
.kid.big .cir{width:34px;height:34px;font-size:15px}
.kid.big .grd{font-size:10px}
.fam-pill{display:inline-flex;align-items:center;background:var(--spruce);color:#E7EEE8;height:22px;padding:0 10px;border-radius:20px;font-size:11px;font-weight:600}
.mom-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--madder-soft);color:#993C1D;width:22px;height:22px;border-radius:50%;flex:none}
.mom-badge svg{width:13px;height:13px}
.mom-badge.big{width:34px;height:34px}.mom-badge.big svg{width:18px;height:18px}
.thin-pill{border:1px solid var(--pill-border);color:var(--pill-text);padding:1.5px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.cnt{color:var(--ink);font-weight:500}
.cnt svg{width:13px;height:13px}
.dot-sep{color:var(--line)}
.icon-btn{appearance:none;background:none;border:none;color:var(--icon);width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;padding:0;flex:none}
.icon-btn svg{width:16px;height:16px}
.icon-btn:hover{color:var(--ink);background:var(--paper)}
.icon-btn:disabled{opacity:.3;cursor:default;background:none;color:var(--icon)}
.icon-btn.danger:hover{color:var(--madder);background:var(--madder-soft)}
.actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.year-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.compact-date{max-width:150px}
.cswatch{width:30px;height:30px;border-radius:8px;border:1px solid rgba(0,0,0,.12);cursor:pointer;padding:0;flex:none}
.mini-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:3px}
.overlay{position:fixed;inset:0;background:rgba(43,38,31,.45);z-index:60;overflow:auto;padding:20px 12px}
.overlay .modal{max-width:760px;margin:0 auto 40px}
.overlay .modal>.card{box-shadow:0 18px 50px rgba(43,38,31,.35);border-color:var(--line)}
details.adv summary{cursor:pointer;color:var(--muted);font-size:14px;font-weight:600}
</style>
</head>

<div id="app"></div>
<div id="toasts"></div>
<script>
"use strict";
/* ================================================================
   SECTION 1 — DATA & CONFIG
   Pure data. No logic. Edit lists here (taxonomy also lives in the
   data file once created, where it becomes user-editable in-app).
   1.1 App identity   1.2 Taxonomy starter   1.3 Enumerations
   1.4 Defaults
   ================================================================ */

/* --- 1.1 App identity & schema version --- */
const APP = { name: "Homeschool Planner", version: "0.4.0", stage: "Stage 3 — Scheduling", schemaVersion: 7, dataFileName: "planner-data.json" };

/* --- 1.2 Content taxonomy starter set (Handoff v5 §3a) --- */
const TAXONOMY_STARTER = {
  categories: [                                      // color = the stripe on course rows (owner's five, editable in Categories & Colors)
    { name: "Together Time", color: "#3D5A49" },
    { name: "Ordinary Days", color: "#B8892F" },
    { name: "Festival Days", color: "#A4553F" },
    { name: "Field Trips",  color: "#4A6FA5" },
    { name: "Activities",   color: "#7B5AA6" }
  ],
  subjects: [
    { name:"Bible", dept:"Bible", tint:"#EAF0E6", focuses:["Bible Reading","Scripture Memory","Catechism & Creeds","Devotional Theology","Church History"] },
    { name:"History", dept:"Social Studies", tint:"#F6EFD9", focuses:["U.S. History"] },
    { name:"Civics", dept:"Social Studies", tint:"#F1E7E2", focuses:[] },
    { name:"Literature", dept:"English", tint:"#E7ECF2", focuses:["Classic Books","Folk & Fairy Tales","Poetry","Shakespeare"] },
    { name:"Language Arts", dept:"English", tint:"#EEE8F2", focuses:["Phonics & Reading","Handwriting","Copywork","Dictation & Spelling","Recitation","Narration"] },
    { name:"Foreign Language", dept:"World Languages", tint:"#E6F0EE", focuses:["Spanish","French"] },
    { name:"Art", dept:"Fine Arts", tint:"#F2E9ED", focuses:["Picture Study","Drawing","Handicrafts"] },
    { name:"Music", dept:"Fine Arts", tint:"#EDF0E3", focuses:["Composer Study","Folk Songs & Hymns","Music Theory & Solfege","Performing Arts"] },
    { name:"Geography", dept:"Social Studies", tint:"#F4EDE0", focuses:["Mapwork & Drills","Regional Studies"] },
    { name:"Math", dept:"Mathematics", tint:"#E9EFE9", focuses:["Arithmetic","Math Games"] },
    { name:"Science", dept:"Science", tint:"#F0EAE4", focuses:["Nature Study","Science Reading"] },
    { name:"PE", dept:"Physical Education / Health", tint:"#E8EDF0", focuses:["Swedish Drill","Sports & Movement"] },
    { name:"Life Skills", dept:"Life Skills / Practical Arts", tint:"#F2EFE6", focuses:["Cooking & Nutrition","Gardening","Sewing & Textiles","Home Management"] },
    { name:"Electives", dept:"Electives", tint:"#ECE9F0", focuses:[] }
  ],
  assignmentTypes: ["Lesson","Reading","Narration","Copywork","Recitation","Practice","Exam","Quiz","Paper","Lab","Project","Other"]
};

/* --- 1.3 Enumerations --- */
const GRADE_LEVELS = ["PreK","K","1st","2nd","3rd","4th","5th","6th","7th","8th","9th","10th","11th","12th"];
const CYCLES = [1,2,3,4,5,6];   // plain 1–6 (Ambleside prep — owner-locked; NOT user-defined cycles)
const TT_VARIANTS = ["A","B"];
const PERSON_ROLES = ["student","parent"];
const STUDENT_STATUSES = ["enrolled","sit-in","future"];
const WEEKDAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const STUDENT_COLORS = ["#3D5A49","#A4553F","#B8892F","#4A6FA5","#7B5AA6","#3E8E7E","#8A4E67","#5C6B3C"];
const CATEGORY_COLORS = ["#3D5A49","#B8892F","#A4553F","#4A6FA5","#7B5AA6","#3E8E7E","#8A4E67","#5C6B3C"];   // stripe palette — new categories take the next one automatically
const SUBJECT_TINTS = ["#EAF0E6","#F6EFD9","#F1E7E2","#E7ECF2","#EEE8F2","#E6F0EE","#F2E9ED","#EDF0E3","#F4EDE0","#E9EFE9","#F0EAE4","#E8EDF0","#F2EFE6","#ECE9F0"];   // soft pill tints — same rule
const COURSE_TYPES = [                       // v5 §5 Course.type
  ["individual","Individual — one student's own work"],
  ["group","Group — several students, checked off once for all"],
  ["family","Family — the whole family (Together Time, festivals)"]
];
const COURSE_STATUSES = ["active","paused","completed","archived"];   // v5 §5

/* --- 1.4 Defaults --- */
const DEFAULTS = {
  weekdayPattern: [1,2,3,4,5],   // Mon–Fri (0=Sun … 6=Sat) — projection only, per owner decision
  targetDays: 180,
  backupsToKeep: 30,             // plus one monthly keeper
  browserBackupsToKeep: 5,       // rolling backups kept inside the browser (fallback mode)
  activityLogCap: 500,
  autosaveDelayMs: 900
};

/* ================================================================
   SECTION 2 — SHARED HELPERS
   Generic utilities only; no app state in here.
   2.1 Ids & time   2.2 Dates   2.3 DOM   2.4 Misc
   ================================================================ */

/* --- 2.1 Ids & time --- */
function uid(){ return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8); }
function nowISO(){ return new Date().toISOString(); }
function stamp(){ const d=new Date(),p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"_"+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }

/* --- 2.2 Dates (dates are stored as "YYYY-MM-DD" strings) --- */
function fmtDate(s){ if(!s) return "—"; const [y,m,d]=s.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
function fmtTime(iso){ if(!iso) return "—"; return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
function yearLabelFromDate(s){ if(!s) return ""; const y=Number(s.slice(0,4)); const m=Number(s.slice(5,7));
  return m>=6 ? y+"–"+(y+1) : (y-1)+"–"+y; }

/* --- 2.3 DOM --- */
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function el(tag, attrs, ...kids){
  const n=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class") n.className=v;
    else if(k.startsWith("on")) n.addEventListener(k.slice(2),v);
    else if(k==="html") n.innerHTML=v;
    else if(v!==false&&v!=null) n.setAttribute(k,v===true?"":v);
  }
  for(const kid of kids.flat()){ if(kid==null||kid===false) continue;
    n.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return n;
}
function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); return n; }
function dateInput(attrs){            // date field that reliably opens its picker on iPad —
  const i=el("input",Object.assign({type:"date"},attrs||{}));   // inside a floating pop-up, iOS Safari sometimes
  i.addEventListener("click",()=>{ try{ if(i.showPicker) i.showPicker(); }catch(e){/* needs a user gesture; the tap is one */} });
  return i;                           // swallows the tap that should open the date wheel; showPicker() asks explicitly
}

/* --- 2.4 Misc --- */
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function normalizeLink(u){          // "www.amazon.com" → "https://www.amazon.com" (bare links otherwise open as relative paths → 404)
  u=(u||"").trim();
  if(!u) return "";
  if(/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(u)) return u;   // has a scheme (https:, mailto:, …)
  if(u.startsWith("//")) return "https:"+u;
  return "https://"+u;
}
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
function toast(msg, warn){ const t=el("div",{class:"toast"+(warn?" warn":"")},msg);
  document.getElementById("toasts").append(t); setTimeout(()=>t.remove(), warn?5200:3200); }
function download(filename, text, mime){
  const a=el("a",{href:URL.createObjectURL(new Blob([text],{type:mime||"application/json"})),download:filename});
  document.body.append(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},400);
}
/* CSV, both directions (RFC-4180 style: quoted fields may hold commas, quotes
   and even line breaks; Excel writes exactly this). Generic — the planner
   dialect itself lives in Section 5.6. */
function parseCSV(text){                        // → array of rows, each an array of strings
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);       // Excel's UTF-8 byte-order mark
  const rows=[]; let row=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=ch;
    } else if(ch==='"') inQ=true;
    else if(ch===","){ row.push(field); field=""; }
    else if(ch==="\n" || ch==="\r"){
      if(ch==="\r" && text[i+1]==="\n") i++;
      row.push(field); field=""; rows.push(row); row=[];
    } else field+=ch;
  }
  if(field!=="" || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function csvField(v){                           // quote only when the field needs it
  v=String(v??"");
  return /[",\r\n]/.test(v) ? '"'+v.replaceAll('"','""')+'"' : v;
}
function toCSV(rows){                           // UTF-8 BOM + CRLF, so Excel opens it right by double-click
  return "\uFEFF"+rows.map(r=>r.map(csvField).join(",")).join("\r\n")+"\r\n";
}
/* ================================================================
   SECTION 3 — STATE (single source of truth)
   3.1 State object   3.2 Blank data file & entity factories
   3.3 Change tracking & activity log   3.4 Schema upgrades
   ================================================================ */

/* --- 3.1 The one state object. All screens read from here. --- */
const State = {
  data: null,                 // the parsed data file — everything permanent lives in here
  dirty: false,               // unsaved changes exist
  storage: {
    mode: null,               // "folder" (Chrome/Edge on Mac) | "browser" (Safari/iPad/iPhone)
    dirHandle: null,          // folder mode: the chosen iCloud folder
    loadedFileModified: null, // folder mode: data file's on-disk timestamp when we loaded it
    lastSavedAt: null,
    saving: false
  },
  ui: { screen: "home", editingPersonId: null, yearFormOpen: false, selectedYearId: null, personFormOpen: false,
        selectedCourseId: null, courseFormOpen: false, editingCourseId: null,        // Stage 2
        assignFormOpen: false, editingAssignId: null, quickAddOpen: false, editingYearId: null,
        colorsOpen: false, colorPick: null,    // Categories & Colors screen + its picker modal
        csvOpen: false, importSummary: null }  // the Import/Export pop-up + the after-import report
};

/* --- 3.2 Blank data file & entity factories --- */
function blankData(){
  const t = nowISO();
  return {
    schemaVersion: APP.schemaVersion,
    app: APP.name,
    createdAt: t, modifiedAt: t,
    taxonomy: deepClone(TAXONOMY_STARTER),   // editable copy; Category Manager UI arrives in Phase 2
    people: [], schoolYears: [],
    courses: [], assignments: [], instances: [], completions: [], books: [],
    activityLog: [],
    settings: { activeSchoolYearId: null }
  };
}
function newPerson(){ const t=nowISO(); return { id:uid(), createdAt:t, modifiedAt:t,
  name:"", role:"student", status:"enrolled", color:STUDENT_COLORS[(State.data?.people.length||0)%STUDENT_COLORS.length], notes:"" }; }
function newSchoolYear(){ const t=nowISO(); return { id:uid(), createdAt:t, modifiedAt:t,
  label:"", startDate:"", endDate:"", cycle:1, ttVariant:"A", targetDays:DEFAULTS.targetDays,
  weekdayPattern:[...DEFAULTS.weekdayPattern], terms:[], breaks:[], studentGrades:{}, archived:false }; }
function newCourse(){ const t=nowISO(); return { id:uid(), createdAt:t, modifiedAt:t,
  name:"", category:"Ordinary Days", subject:"", focus:"",       // three-level taxonomy labels (v5 §3a)
  cycle:null,                       // 1–4 or null (Kindergarten & custom courses carry none)
  role:"working",                   // "master" | "working" (v5) — manual courses are working courses; masters arrive with the importer
  bundle:null,                      // masters only (v5) — unused until the import stages
  type:"individual",                // "individual" | "group" | "family"
  studentIds:[],                    // working courses; empty for family courses
  parentLed:false,
  optional:false,                   // v7: an opt-in course (electives, reading practice) — enrollment offers it unchecked
  source:"custom",                  // "custom" (made in the app) | "import" (arrived by CSV)
  curriculum:"",                    // v7: where it came from — e.g. "Living Heritage Cycle 1 Group I"
  curriculumRevised:"",             // v7: that curriculum's last-revised date, e.g. "2025"
  gradeYears:"",                    // v7: which grades the course serves — e.g. "1st", "2nd-4th", "All"
  frequency:"",                     // v7: the stated cadence, per strand — feeds the scheduling engine later
  yearId: State.data?.settings.activeSchoolYearId || null,
  weeks:32,                         // the course's own length in weeks (positions, not calendar — Stage 3 projects onto dates)
  cadence:5,                        // days per week — the width of the course's week/day grid; scheduling projects it in Stage 3
  lessonMinutes:null,               // typical lesson length
  links:[],                         // resource links (one URL per line in the form)
  notes:"", sortPos:0,              // manual sort order within its category (v5, P1 groundwork)
  status:"active" }; }
function newAssignment(courseId){ const t=nowISO(); return { id:uid(), createdAt:t, modifiedAt:t,
  courseId, seq:0,                  // teaching order — independent of calendar dates (plan/schedule separation)
  title:"", description:"", type:"Lesson",
  subjectOverride:"", focusOverride:"",   // inherit the course's labels unless set (v5)
  resource:"",                      // v7: the book/material this assignment uses (from the CSV's Resource column)
  link:"", minutes:null, tags:[], notes:"",
  narrationExpected:false, narrationPrompt:"",
  week:1, day:1,                    // position in the course's own grid: "Week 3, Day 2" of the course, never a calendar date
  batchId:null, batchN:null,        // series membership: created-together assignments share a batchId; batchN is this row's number
  seriesRule:null }; }              // recurring definition, kept on every member: {slots,fromWeek,toWeek,everyN,numbered}

/* --- 3.3 Change tracking, autosave trigger & activity log --- */
function logActivity(what, detail){
  State.data.activityLog.unshift({ id:uid(), at:nowISO(), what, detail: detail||"" });
  if(State.data.activityLog.length > DEFAULTS.activityLogCap) State.data.activityLog.length = DEFAULTS.activityLogCap;
}
const scheduleSave = debounce(()=>saveNow(false), DEFAULTS.autosaveDelayMs);
function markDirty(what, detail){
  State.data.modifiedAt = nowISO();
  if(what) logActivity(what, detail);
  State.dirty = true;
  renderSaveStatus();
  scheduleSave();
}

/* --- 3.4 Schema upgrades: the data file carries its version; the app
       upgrades older files on load so later field additions are routine. --- */
function upgradeSchema(data){
  if(typeof data.schemaVersion !== "number") throw new Error("Not a planner data file");
  while(data.schemaVersion < APP.schemaVersion){
    switch(data.schemaVersion){
      case 1:  // v2: courses & assignments in use. Stage 1 files already carry the
               // empty collections; this defensively fills anything missing.
        data.courses = data.courses || [];
        data.assignments = data.assignments || [];
        data.instances = data.instances || [];
        data.completions = data.completions || [];
        data.books = data.books || [];
        data.taxonomy = data.taxonomy || deepClone(TAXONOMY_STARTER);
        if(!Array.isArray(data.taxonomy.assignmentTypes) || !data.taxonomy.assignmentTypes.length)
          data.taxonomy.assignmentTypes = [...TAXONOMY_STARTER.assignmentTypes];
        data.schemaVersion = 2; break;
      case 2:  // v3: assignments carry series membership (batchId/batchN)
        (data.assignments||[]).forEach(a=>{ if(!("batchId" in a)) a.batchId=null; if(!("batchN" in a)) a.batchN=null; });
        data.schemaVersion = 3; break;
      case 3:  // v4: week/day grid — courses get weeks + days-per-week; assignments get a
               // grid position (derived from their old sequence number) and a series rule slot;
               // links are normalized (bare "www…" links used to 404 as relative paths).
        (data.courses||[]).forEach(c=>{
          if(!("weeks" in c) || !c.weeks) c.weeks=32;
          if(!c.cadence) c.cadence=5;
          c.links=(c.links||[]).map(normalizeLink);
        });
        (data.assignments||[]).forEach(a=>{
          const c=(data.courses||[]).find(x=>x.id===a.courseId);
          const dpw=Math.min(7,Math.max(1,(c&&c.cadence)||5));
          if(!("week" in a) || !a.week){ a.week=Math.floor((a.seq-1)/dpw)+1; a.day=((a.seq-1)%dpw)+1; }
          if(!("seriesRule" in a)) a.seriesRule=null;
          a.link=normalizeLink(a.link);
        });
        data.schemaVersion = 4; break;
      case 5: {  // v6: colors — a stripe color on every category, a soft tint on every subject
                 // (restyle round). Auto-assigned so the owner is never stuck without one.
        const seed={"Together Time":"#3D5A49","Ordinary Days":"#B8892F","Festival Days":"#A4553F","Field Trips":"#4A6FA5","Activities":"#7B5AA6"};
        const tx=data.taxonomy||{};
        (tx.categories||[]).forEach((k,i)=>{ if(!k.color) k.color=seed[k.name]||CATEGORY_COLORS[i%CATEGORY_COLORS.length]; });
        (tx.subjects||[]).forEach((s,i)=>{ if(!s.tint) s.tint=SUBJECT_TINTS[i%SUBJECT_TINTS.length]; });
        data.schemaVersion = 6; break; }
      case 4: {  // v5: one flat course list — manual sort order becomes global, not per-category
        const catOrder=(data.taxonomy&&data.taxonomy.categories?data.taxonomy.categories:[]).map(k=>k.name);
        const rank=n=>{ const i=catOrder.indexOf(n); return i<0?999:i; };
        (data.courses||[]).slice()
          .sort((a,b)=>(rank(a.category)-rank(b.category)) || ((a.sortPos||0)-(b.sortPos||0)) || (a.name||"").localeCompare(b.name||""))
          .forEach((c,i)=>{ c.sortPos=i+1; });
        data.schemaVersion = 5; break; }
      case 6:    // v7: the importer round — courses learn where they came from (curriculum,
                 // revised date, grade years), whether they're opt-in, and their stated
                 // cadence; assignments learn which book/material they use.
        (data.courses||[]).forEach(c=>{
          if(!("curriculum" in c)) c.curriculum="";
          if(!("curriculumRevised" in c)) c.curriculumRevised="";
          if(!("gradeYears" in c)) c.gradeYears="";
          if(!("optional" in c)) c.optional=false;
          if(!("frequency" in c)) c.frequency="";
        });
        (data.assignments||[]).forEach(a=>{ if(!("resource" in a)) a.resource=""; });
        data.schemaVersion = 7; break;
      default: data.schemaVersion = APP.schemaVersion;   // nothing to do
    }
  }
  return data;
}
function validateData(data){
  if(!data || typeof data!=="object" || !Array.isArray(data.people) || !Array.isArray(data.schoolYears))
    throw new Error("This file doesn't look like a Homeschool Planner data file.");
  return data;
}

/* ================================================================
   SECTION 4 — STORAGE
   Two modes. FOLDER (Chrome/Edge on the Mac): the app reads/writes
   planner-data.json in your chosen iCloud folder and keeps automatic
   backups in backups/. BROWSER (Safari, iPad, iPhone): changes are
   kept safely inside the browser, and you save a copy to Files with
   one tap. Same data file either way.
   4.1 Capability detection & handle memory   4.2 Folder mode
   4.3 Backups (folder)   4.4 Browser mode    4.5 Save/load façade
   4.6 Changed-on-disk protection             4.7 Export & restore
   ================================================================ */

/* --- 4.1 Capability detection + remembering the folder between visits --- */
function folderCapable(){ return typeof window.showDirectoryPicker === "function"; }
const idb = {
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open("hsp",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("kv"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  async get(k){ const db=await this.open(); return new Promise((res,rej)=>{ const t=db.transaction("kv").objectStore("kv").get(k);
    t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); },
  async set(k,v){ const db=await this.open(); return new Promise((res,rej)=>{ const t=db.transaction("kv","readwrite").objectStore("kv").put(v,k);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); },
  async del(k){ const db=await this.open(); return new Promise((res,rej)=>{ const t=db.transaction("kv","readwrite").objectStore("kv").delete(k);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }
};
async function permissionOK(handle, ask){
  const opts={mode:"readwrite"};
  if(await handle.queryPermission(opts)==="granted") return true;
  if(ask && await handle.requestPermission(opts)==="granted") return true;
  return false;
}

/* --- 4.2 Folder mode --- */
async function chooseFolder(){
  try{
    const dir = await window.showDirectoryPicker({ mode:"readwrite" });
    State.storage.dirHandle = dir;
    await idb.set("dirHandle", dir);
    const existing = await dir.getFileHandle(APP.dataFileName).catch(()=>null);
    if(existing){
      await loadFromFolder();
      toast("Loaded your planner from " + dir.name);
    } else {
      State.data = blankData();
      logActivity("Planner created", "New data file in folder “" + dir.name + "”");
      State.storage.mode = "folder";
      await saveNow(true);
      toast("New planner created in " + dir.name);
    }
    State.storage.mode = "folder";
    State.ui.screen = "home";
    render();
  }catch(e){ if(e && e.name!=="AbortError"){ console.error(e); toast("Couldn't open that folder: "+e.message, true); } }
}
async function loadFromFolder(){
  const dir = State.storage.dirHandle;
  const fh = await dir.getFileHandle(APP.dataFileName);
  const file = await fh.getFile();
  const data = validateData(upgradeSchema(JSON.parse(await file.text())));
  State.data = data;
  State.storage.mode = "folder";
  State.storage.loadedFileModified = file.lastModified;
  State.dirty = false;
}
async function writeFolderFile(name, text, subdir){
  let dir = State.storage.dirHandle;
  if(subdir) dir = await dir.getDirectoryHandle(subdir, { create:true });
  const fh = await dir.getFileHandle(name, { create:true });
  const w = await fh.createWritable();
  await w.write(text); await w.close();
  return fh;
}

/* --- 4.3 Automatic backups (folder mode): timestamped snapshot on every
       save; keep the newest 30 plus the oldest snapshot of each month. --- */
async function writeBackupAndPrune(text){
  try{
    await writeFolderFile("backup_" + stamp() + ".json", text, "backups");
    const backups = await listFolderBackups();
    const keep = new Set(backups.slice(0, DEFAULTS.backupsToKeep).map(b=>b.name));
    const byMonth = {};
    for(const b of backups){ const m=b.name.slice(7,14); // YYYY-MM
      if(!byMonth[m] || b.name < byMonth[m]) byMonth[m]=b.name; }
    Object.values(byMonth).forEach(n=>keep.add(n));
    const dir = await State.storage.dirHandle.getDirectoryHandle("backups");
    for(const b of backups) if(!keep.has(b.name)) await dir.removeEntry(b.name).catch(()=>{});
  }catch(e){ console.error("Backup failed", e); toast("Saved, but the automatic backup failed: "+e.message, true); }
}
async function listFolderBackups(){
  const out=[];
  try{
    const dir = await State.storage.dirHandle.getDirectoryHandle("backups");
    for await (const [name,handle] of dir.entries())
      if(handle.kind==="file" && name.startsWith("backup_") && name.endsWith(".json")) out.push({name,handle});
  }catch(e){/* no backups dir yet */}
  return out.sort((a,b)=>b.name.localeCompare(a.name));
}

/* --- 4.4 Browser mode (Safari / iPad / iPhone): localStorage is the
       working copy; “Save a copy” hands the file to the Files app. --- */
const LS_KEY="hsp_data", LS_BAK="hsp_backups";
const store = {   // safe localStorage wrapper — some contexts block storage entirely
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ localStorage.setItem(k,v); }
};
function saveToBrowser(){
  try{
    store.set(LS_KEY, JSON.stringify(State.data));
    const baks = JSON.parse(store.get(LS_BAK)||"[]");
    const last = baks[0];
    if(!last || Date.now()-last.at > 10*60*1000){          // rolling backup at most every 10 min
      baks.unshift({ at:Date.now(), data:JSON.stringify(State.data) });
      baks.length = Math.min(baks.length, DEFAULTS.browserBackupsToKeep);
      store.set(LS_BAK, JSON.stringify(baks));
    }
  }catch(e){ console.error(e); toast("Couldn't store changes in this browser: "+e.message, true); }
}
function loadFromBrowser(){
  const raw = store.get(LS_KEY);
  if(!raw) return false;
  State.data = validateData(upgradeSchema(JSON.parse(raw)));
  State.storage.mode = "browser";
  State.dirty = false;
  return true;
}
async function loadFromPickedFile(file){
  const data = validateData(upgradeSchema(JSON.parse(await file.text())));
  if(State.data && State.data.modifiedAt && data.modifiedAt < State.data.modifiedAt){
    if(!confirm("Careful — the file you picked was last changed "+fmtTime(data.modifiedAt)+", but this device's copy is newer ("+fmtTime(State.data.modifiedAt)+").\n\nOK = load the older file anyway (this device's newer work is replaced)\nCancel = keep what's on this device")) return;
    logActivity("Older file loaded over newer copy", file.name);
  }
  State.data = data;
  if(State.storage.mode!=="folder") State.storage.mode = "browser";
  State.dirty = true;                                     // so it gets written into this device's store
  logActivity("Data file loaded", "Loaded “"+file.name+"” ("+fmtTime(new Date(file.lastModified).toISOString())+")");
  saveNow(true);
  State.ui.screen="home"; render();
  toast("Loaded " + file.name);
}

/* --- 4.5 Save/load façade used by the rest of the app --- */
async function saveNow(force){
  if(!State.data || State.storage.saving) return;
  if(!State.dirty && !force) return;
  State.storage.saving = true; renderSaveStatus();
  try{
    if(State.storage.mode==="folder"){
      const clash = await fileChangedOnDisk();
      if(clash && !force){
        State.storage.saving=false;
        const reload = confirm("The data file on disk is newer than what this window loaded — it may have been saved from another device.\n\nOK = load the newer file (this window's unsaved edits are discarded)\nCancel = keep this window's version and overwrite the file");
        if(reload){ await loadFromFolder(); render(); toast("Reloaded the newer file"); return; }
      }
      const text = JSON.stringify(State.data, null, 1);
      const fh = await writeFolderFile(APP.dataFileName, text);
      State.storage.loadedFileModified = (await fh.getFile()).lastModified;
      await writeBackupAndPrune(text);
    } else {
      saveToBrowser();
    }
    State.dirty = false;
    State.storage.lastSavedAt = nowISO();
  }catch(e){ console.error(e); toast("Save failed: "+e.message, true); }
  finally{ State.storage.saving = false; renderSaveStatus(); }
}

/* --- 4.6 Changed-on-disk protection (folder mode) --- */
async function fileChangedOnDisk(){
  try{
    const fh = await State.storage.dirHandle.getFileHandle(APP.dataFileName);
    const f = await fh.getFile();
    return State.storage.loadedFileModified && f.lastModified > State.storage.loadedFileModified;
  }catch(e){ return false; }
}
window.addEventListener("focus", async ()=>{
  if(State.storage.mode==="folder" && State.data && await fileChangedOnDisk() && !State.dirty){
    await loadFromFolder(); render(); toast("Picked up newer changes from the data file");
  }
});

/* --- 4.7 Export & restore --- */
function exportJSON(){
  if(!State.data) return;
  download("planner-data.json", JSON.stringify(State.data, null, 1));
  logActivity("Exported data file"); scheduleSave();
  toast(State.storage.mode==="browser"
    ? "Choose “Save to Files” and put it in your planner folder"
    : "Exported a copy of your data file");
}
function exportDatedBackup(){   // browser mode's manual mirror of the Mac's automatic snapshots
  if(!State.data) return;
  download("backup_" + stamp() + ".json", JSON.stringify(State.data, null, 1));
  logActivity("Dated backup exported"); scheduleSave();
  toast("Choose “Save to Files” and drop it into your backups/ folder");
}
async function restoreFromBackup(entry){
  if(!confirm("Restore this backup from "+entry.label+"?\n\nYour current data will be replaced (a final backup of it is written first).")) return;
  try{
    const text = State.storage.mode==="folder"
      ? await (await entry.handle.getFile()).text()
      : entry.data;
    if(State.storage.mode==="folder") await writeBackupAndPrune(JSON.stringify(State.data,null,1));
    State.data = validateData(upgradeSchema(JSON.parse(text)));
    logActivity("Restored from backup", entry.label);
    State.dirty = true; await saveNow(true); render();
    toast("Restored backup from "+entry.label);
  }catch(e){ console.error(e); toast("Restore failed: "+e.message, true); }
}
/* ================================================================
   SECTION 5 — FEATURES (people, school years, courses, assignments)
   Small functions that change State.data and call markDirty.
   5.1 People   5.2 School years, breaks, terms, grades
   5.3 Taxonomy helpers   5.4 Courses   5.5 Assignments & repeating rules
   5.6 Course CSV import & export (the dialect the converters write)
   ================================================================ */

/* --- 5.1 People --- */
function savePerson(p, isNew){
  p.name = p.name.trim();
  if(!p.name){ toast("Please give them a name", true); return false; }
  if(isNew) State.data.people.push(p); else p.modifiedAt = nowISO();
  markDirty(isNew?"Person added":"Person updated", p.name+" ("+p.role+(p.role==="student"?", "+p.status:"")+")");
  return true;
}
function deletePerson(p){
  const inCourses=State.data.courses.filter(c=>c.studentIds.includes(p.id)).length;
  if(!confirm("Remove "+p.name+"? This can't be undone."+(inCourses?"\n\nThey are on "+inCourses+" course"+(inCourses===1?"":"s")+" — they'll be taken off those lists (the courses themselves stay).":""))) return;
  State.data.people = State.data.people.filter(x=>x.id!==p.id);
  State.data.schoolYears.forEach(y=>{ delete y.studentGrades[p.id]; });
  State.data.courses.forEach(c=>{ c.studentIds=c.studentIds.filter(id=>id!==p.id); });
  markDirty("Person removed", p.name);
  render();
}
function students(){ return State.data.people.filter(p=>p.role==="student"); }

/* --- 5.2 School years --- */
function saveYear(y, isNew){
  y.label = y.label.trim() || yearLabelFromDate(y.startDate);
  if(!y.label){ toast("Please set a label or a start date", true); return false; }
  if(!y.startDate || !y.endDate){ toast("Please set start and end dates", true); return false; }
  if(y.endDate <= y.startDate){ toast("The end date must be after the start date", true); return false; }
  if(!y.weekdayPattern.length){ toast("Pick at least one school day of the week", true); return false; }
  if(isNew){ State.data.schoolYears.push(y);
    if(!State.data.settings.activeSchoolYearId) State.data.settings.activeSchoolYearId = y.id; }
  else y.modifiedAt = nowISO();
  markDirty(isNew?"School year created":"School year updated", y.label+" · Cycle "+y.cycle+y.ttVariant);
  return true;
}
function deleteYear(y){
  const linked=State.data.courses.filter(c=>c.yearId===y.id);
  if(!confirm("Delete the "+y.label+" school year? Breaks, terms and grade assignments in it are removed too."
    +(linked.length?"\n\n"+linked.length+" course"+(linked.length===1?"":"s")+" point at this year — they'll stay, but lose their year link.":""))) return;
  linked.forEach(c=>{ c.yearId=null; c.modifiedAt=nowISO(); });
  State.data.schoolYears = State.data.schoolYears.filter(x=>x.id!==y.id);
  if(State.data.settings.activeSchoolYearId===y.id)
    State.data.settings.activeSchoolYearId = State.data.schoolYears[0]?.id || null;
  markDirty("School year deleted", y.label);
  State.ui.selectedYearId=null; render();
}
function setYearArchived(y, flag){
  if(flag){
    const affected=State.data.courses.filter(c=>c.yearId===y.id && c.status!=="archived");
    if(!confirm("Archive "+y.label+"? It can no longer be the active year"
      +(affected.length?", and its "+affected.length+" course"+(affected.length===1?"":"s")+" will be archived with it":"")
      +". Nothing is deleted — grades and records are kept for portfolios and transcripts.")) return;
    affected.forEach(c=>{ c.status="archived"; c.modifiedAt=nowISO(); });
    y.archived=true;
    if(State.data.settings.activeSchoolYearId===y.id) State.data.settings.activeSchoolYearId=null;
    touchYear(y,"Year archived", y.label+(affected.length?" (with "+affected.length+" courses)":""));
  } else {
    y.archived=false;
    touchYear(y,"Year unarchived", y.label+" — its courses stay archived; un-archive any course from its editor");
  }
  render();
}
function addDateBlock(y, kind, name, start, end, quiet){   // kind: "breaks" | "terms"; quiet: editing a form clone
  name=(name||"").trim();
  if(!name || !start || !end){ toast("Name, start and end are all needed", true); return false; }
  if(end < start){ toast("The end date can't be before the start", true); return false; }
  y[kind].push({ id:uid(), name, start, end });
  y[kind].sort((a,b)=>a.start.localeCompare(b.start));
  if(!quiet) touchYear(y, (kind==="breaks"?"Break":"Term")+" added", name+" · "+y.label);
  return true;
}
function removeDateBlock(y, kind, id, quiet){
  const b=y[kind].find(x=>x.id===id);
  y[kind]=y[kind].filter(x=>x.id!==id);
  if(!quiet) touchYear(y, (kind==="breaks"?"Break":"Term")+" removed", (b?b.name:"")+" · "+y.label);
}
function setGrade(y, personId, grade, quiet){
  if(grade) y.studentGrades[personId]=grade; else delete y.studentGrades[personId];
  if(!quiet){ const p=State.data.people.find(x=>x.id===personId); touchYear(y,"Grade set",(p?p.name:"?")+" → "+(grade||"—")+" · "+y.label); }
}
function touchYear(y, what, detail){ y.modifiedAt=nowISO(); markDirty(what, detail); }
function activeYear(){ return State.data.schoolYears.find(y=>y.id===State.data.settings.activeSchoolYearId) || null; }

/* --- 5.3 Taxonomy helpers (reads/writes the data file's editable copy) --- */
function tax(){ return State.data.taxonomy; }
function taxSubject(name){ return tax().subjects.find(s=>s.name===name) || null; }
function focusesFor(subjectName){ const s=taxSubject(subjectName); return s ? s.focuses : []; }
function addTaxSubject(name){
  name=(name||"").trim();
  if(!name) return null;
  const dup=taxSubject(name); if(dup) return dup.name;
  tax().subjects.push({ name, dept:"", focuses:[],
    tint:SUBJECT_TINTS[tax().subjects.length%SUBJECT_TINTS.length] });   // every subject gets a pill tint automatically; dept editable later (P1)
  markDirty("Subject added", name);
  return name;
}
function catColor(name){ const k=tax().categories.find(x=>x.name===name); return (k&&k.color)||"#C7C4B9"; }   // the stripe
function subjTint(name){ const s=taxSubject(name); return (s&&s.tint)||"#F1EFE8"; }                              // the pill
function setCatColor(name, color){ const k=tax().categories.find(x=>x.name===name); if(!k) return;
  k.color=color; markDirty("Category color changed", name); }
function setSubjTint(name, tint){ const s=taxSubject(name); if(!s) return;
  s.tint=tint; markDirty("Subject tint changed", name); }
function addTaxFocus(subjectName, name){
  name=(name||"").trim();
  const s=taxSubject(subjectName);
  if(!s || !name) return null;
  if(!s.focuses.includes(name)){ s.focuses.push(name); markDirty("Focus added", subjectName+" → "+name); }
  return name;
}

/* --- 5.4 Courses --- */
function coursesAll(){                          // one flat, hand-ordered list (v0.2.4: categories are labels, not walls)
  return State.data.courses.slice().sort((a,b)=>(a.sortPos-b.sortPos)||a.name.localeCompare(b.name));
}
function courseById(id){ return State.data.courses.find(c=>c.id===id) || null; }
function saveCourse(c, isNew){
  c.name=c.name.trim();
  if(!c.name){ toast("Please give the course a name", true); return false; }
  if(!c.category){ toast("Please pick a category", true); return false; }
  if(c.type==="family") c.studentIds=[];
  c.links=(c.links||[]).map(normalizeLink);
  if(isNew){
    c.sortPos = Math.max(0, ...State.data.courses.map(x=>x.sortPos)) + 1;
    State.data.courses.push(c);
  } else c.modifiedAt=nowISO();
  markDirty(isNew?"Course added":"Course updated", c.name+" ("+c.category+(c.subject?" · "+c.subject:"")+")");
  return true;
}
function deleteCourse(c){
  const n=courseAssignments(c.id).length;
  if(!confirm("Delete “"+c.name+"”"+(n?" and its "+n+" assignment"+(n===1?"":"s"):"")+"? This can't be undone.")) return;
  State.data.assignments = State.data.assignments.filter(a=>a.courseId!==c.id);
  State.data.courses = State.data.courses.filter(x=>x.id!==c.id);
  if(State.ui.selectedCourseId===c.id) State.ui.selectedCourseId=null;
  markDirty("Course deleted", c.name+(n?" (with "+n+" assignments)":""));
  render();
}
function moveCourse(c, dir){                    // manual sort in the one flat list — categories don't block the arrows
  const list=coursesAll();
  list.forEach((x,i)=>x.sortPos=i+1);           // normalize first
  const i=list.indexOf(c), j=i+dir;
  if(j<0 || j>=list.length) return;
  [list[i].sortPos, list[j].sortPos] = [list[j].sortPos, list[i].sortPos];
  markDirty();                                   // stamps modified without flooding the activity log
  render();
}
function courseStudents(c){
  return c.type==="family" ? [] : students().filter(s=>c.studentIds.includes(s.id));
}

/* --- 5.5 Assignments & repeating rules --- */
function dpw(c){ return Math.min(7, Math.max(1, c.cadence||5)); }          // days per week (grid width)
function weeksOf(c){ const m=Math.max(0,...courseAssignments(c.id).map(a=>a.week||0)); return Math.max(c.weeks||0, m) || 32; }
function posKey(a){ return (a.week||9999)*100000 + (a.day||99)*1000; }       // sort by week, then day…
function courseAssignments(courseId){
  return State.data.assignments.filter(a=>a.courseId===courseId)
    .sort((a,b)=>(posKey(a)-posKey(b)) || (a.seq-b.seq));                    // …then stable order within a day
}
function resequence(courseId){ courseAssignments(courseId).forEach((a,i)=>a.seq=i+1); }
function prevSlot(w,d,width){ return d>1 ? [w,d-1] : [w-1,width]; }
function nextSlot(w,d,width){ return d<width ? [w,d+1] : [w+1,1]; }
function saveAssignment(a, isNew){
  a.title=a.title.trim();
  a.link=normalizeLink(a.link);
  if(!a.title){ toast("Please give the assignment a title", true); return false; }
  if(a.subjectOverride==="") a.focusOverride=a.focusOverride||"";   // focus-only overrides are allowed
  if(isNew){ a.seq = courseAssignments(a.courseId).length + 1; State.data.assignments.push(a); }
  else a.modifiedAt=nowISO();
  const c=courseById(a.courseId);
  markDirty(isNew?"Assignment added":"Assignment updated", (c?c.name+" · ":"")+"#"+a.seq+" "+a.title);
  return true;
}
function deleteAssignment(a){
  if(!confirm("Delete assignment #"+a.seq+" “"+a.title+"”? The rest of the sequence closes up around it.")) return;
  State.data.assignments = State.data.assignments.filter(x=>x.id!==a.id);
  resequence(a.courseId);
  const c=courseById(a.courseId);
  markDirty("Assignment deleted", (c?c.name+" · ":"")+a.title);
  render();
}
function moveAssignment(a, dir){   // ↑↓ = trade places with the visual neighbor: order AND grid position swap together
  const c=courseById(a.courseId), width=dpw(c);
  const list=courseAssignments(a.courseId);
  const i=list.indexOf(a), j=i+dir;
  const neighbor=(j>=0 && j<list.length)?list[j]:null;
  if(neighbor){
    [a.week, neighbor.week]=[neighbor.week, a.week];
    [a.day, neighbor.day]=[neighbor.day, a.day];
    [a.seq, neighbor.seq]=[neighbor.seq, a.seq];
  } else if(dir<0){                                              // already first: step into the previous empty slot
    const [w,d]=prevSlot(a.week,a.day,width);
    if(w<1) return;
    a.week=w; a.day=d;
  } else {                                                       // already last: step into the next slot
    const [w,d]=nextSlot(a.week,a.day,width);
    a.week=w; a.day=d;
  }
  resequence(a.courseId);
  markDirty();                                                    // stamps modified; no log entry per nudge
  render();
}
function placeAt(a, week, day){                 // direct placement (the edit form's Week/Day fields)
  week=Math.max(1,Math.floor(week)||1); day=Math.max(1,Math.floor(day)||1);
  if(a.week===week && a.day===day) return;
  const slotRows=courseAssignments(a.courseId).filter(x=>x.week===week && x.day===day && x.id!==a.id);
  a.week=week; a.day=day;
  a.seq=slotRows.length?Math.max(...slotRows.map(x=>x.seq))+0.25:a.seq;   // last within its new day
  resequence(a.courseId);
}
function effectiveLabels(a, c){                  // what the completion record will one day snapshot
  if(a.subjectOverride) return { subject:a.subjectOverride, focus:a.focusOverride||"" };
  return { subject:c.subject, focus:a.focusOverride||c.focus };
}
function moveAssignmentToCourse(a, newCourseId){ // filed under the wrong course? Move it — a series always travels whole
  const from=courseById(a.courseId), to=courseById(newCourseId);
  if(!to || !from || newCourseId===a.courseId) return 0;
  const rows = a.batchId ? seriesMembers(a.batchId) : [a];
  rows.forEach(r=>{ r.courseId=newCourseId; r.modifiedAt=nowISO(); });   // Week/Day spots travel with the rows
  resequence(from.id); resequence(to.id);
  markDirty(rows.length>1?"Series moved":"Assignment moved",
    (rows.length>1?rows.length+" assignments":"“"+a.title+"”")+" — "+from.name+" → "+to.name);
  return rows.length;
}
/* Repeating rules (v5 P0) as recurring series on the course's week/day grid.
   A rule — repeat on these days, from week X through week Y, every N weeks —
   generates one row per occurrence; members share a batchId and each carries
   the rule, so a series can be edited as one thing (header/detail style) and
   extended or shortened later. Titles: automatic numbering is a checkbox;
   {n} in a title is still honored for patterns like "Chapter {n}". */
function seriesTitle(base, n, numbered){
  return base.includes("{n}") ? base.replaceAll("{n}", n) : (numbered ? base+" "+n : base);
}
function seriesMembers(batchId){ return State.data.assignments.filter(a=>a.batchId===batchId).sort((a,b)=>a.seq-b.seq); }
function ruleOccurrences(rule){                  // → ordered [week, day] pairs the rule covers
  const out=[]; const slots=[...rule.slots].sort((x,y)=>x-y);
  for(let w=rule.fromWeek; w<=rule.toWeek; w+=rule.everyN) slots.forEach(d=>out.push([w,d]));
  return out;
}
const SERIES_FIELDS=["description","type","subjectOverride","focusOverride","resource","link","minutes","tags","notes","narrationExpected","narrationPrompt"];
function fillFromTemplate(row, tmpl){
  SERIES_FIELDS.forEach(f=>{ row[f]=Array.isArray(tmpl[f])?[...tmpl[f]]:tmpl[f]; });
  row.link=normalizeLink(row.link);
}
function createSingle(courseId, tmpl, week, day){
  const a=newAssignment(courseId);
  fillFromTemplate(a,tmpl); a.title=tmpl.title;
  a.week=1; a.day=1; a.seq=1e9;                  // placeAt sorts it into its true slot
  State.data.assignments.push(a);
  placeAt(a, week, day);
  const c=courseById(courseId);
  markDirty("Assignment added",(c?c.name+" · ":"")+a.title+" (Week "+a.week+", Day "+a.day+")");
  return a;
}
function createRecurring(courseId, tmpl, rule){
  rule={ slots:[...new Set(rule.slots)].filter(d=>d>=1), fromWeek:Math.max(1,Math.floor(rule.fromWeek)||1),
         toWeek:Math.max(1,Math.floor(rule.toWeek)||1), everyN:Math.max(1,Math.floor(rule.everyN)||1),
         numbered:!!rule.numbered };
  if(!rule.slots.length){ toast("Pick at least one day of the week to repeat on", true); return 0; }
  if(rule.toWeek<rule.fromWeek){ toast("“Through week” can't be before “from week”", true); return 0; }
  const occ=ruleOccurrences(rule);
  if(occ.length>1000){ toast("That's "+occ.length+" assignments — over the 1,000 safety cap", true); return 0; }
  const bid=uid(); let n=0, seq=1e9;
  occ.forEach(([w,d])=>{
    n++;
    const a=newAssignment(courseId);
    fillFromTemplate(a,tmpl);
    a.title=seriesTitle(tmpl.title, n, rule.numbered);
    a.week=w; a.day=d; a.seq=seq++;
    a.batchId=bid; a.batchN=n; a.seriesRule=deepClone(rule);
    State.data.assignments.push(a);
  });
  resequence(courseId);
  const c=courseById(courseId);
  markDirty("Recurring series added",(c?c.name+" · ":"")+n+" × “"+tmpl.title+"” (weeks "+rule.fromWeek+"–"+rule.toWeek+")");
  return n;
}
function convertToRecurring(a, rule){            // an existing single becomes the series' first matching occurrence
  const before=courseAssignments(a.courseId).length;
  rule={ slots:[...new Set(rule.slots)].filter(d=>d>=1), fromWeek:Math.max(1,Math.floor(rule.fromWeek)||1),
         toWeek:Math.max(1,Math.floor(rule.toWeek)||1), everyN:Math.max(1,Math.floor(rule.everyN)||1),
         numbered:!!rule.numbered };
  if(!rule.slots.length){ toast("Pick at least one day of the week to repeat on", true); return 0; }
  if(rule.toWeek<rule.fromWeek){ toast("“Through week” can't be before “from week”", true); return 0; }
  const occ=ruleOccurrences(rule);
  if(occ.length>1000){ toast("That's "+occ.length+" assignments — over the 1,000 safety cap", true); return 0; }
  const bid=uid(); let n=0, used=false;
  occ.forEach(([w,d])=>{
    n++;
    if(!used && w===a.week && d===a.day){        // the original keeps its slot
      a.batchId=bid; a.batchN=n; a.seriesRule=deepClone(rule);
      a.title=seriesTitle(a.title, n, rule.numbered);
      used=true; return;
    }
    const row=newAssignment(a.courseId);
    fillFromTemplate(row,a);
    row.title=seriesTitle(a.title, n, rule.numbered);
    row.week=w; row.day=d; row.seq=1e9+n;
    row.batchId=bid; row.batchN=n; row.seriesRule=deepClone(rule);
    State.data.assignments.push(row);
  });
  if(!used){ a.batchId=bid; a.batchN=0; a.seriesRule=deepClone(rule); }   // original outside the pattern still belongs
  resequence(a.courseId);
  const c=courseById(a.courseId);
  const made=courseAssignments(a.courseId).length-before;
  markDirty("Assignment made recurring",(c?c.name+" · ":"")+a.title+" +"+made);
  return made;
}
function applySeriesEdits(original, edited){     // header-style editing: changed fields flow to every member
  const base=deepClone(original);                // snapshot first — original is itself a member and gets mutated below
  const members=seriesMembers(original.batchId);
  const titleChanged = edited.title!==base.title;
  members.forEach(m=>{
    SERIES_FIELDS.forEach(f=>{
      const was=base[f], now=edited[f];
      if(JSON.stringify(was)!==JSON.stringify(now)) m[f]=Array.isArray(now)?[...now]:now;
    });
    m.link=normalizeLink(m.link);
    if(titleChanged) m.title=seriesTitle(edited.title, m.batchN, m.seriesRule?m.seriesRule.numbered:false);
    m.modifiedAt=nowISO();
  });
  const c=courseById(original.courseId);
  markDirty("Series updated",(c?c.name+" · ":"")+members.length+" assignments");
}
function reshapeSeries(member, newRule){         // change when & how a series repeats; work already on the new pattern is kept
  const oldRule=member.seriesRule; if(!oldRule) return null;
  newRule={ slots:[...new Set(newRule.slots)].filter(d=>d>=1).sort((x,y)=>x-y),
            fromWeek:Math.max(1,Math.floor(newRule.fromWeek)||1),
            toWeek:Math.max(1,Math.floor(newRule.toWeek)||1),
            everyN:Math.max(1,Math.floor(newRule.everyN)||1),
            numbered:!!newRule.numbered };
  if(!newRule.slots.length){ toast("Pick at least one day of the week to repeat on", true); return null; }
  if(newRule.toWeek<newRule.fromWeek){ toast("“Through week” can't be before “from week”", true); return null; }
  const newOcc=ruleOccurrences(newRule);
  if(newOcc.length>1000){ toast("That's "+newOcc.length+" assignments — over the 1,000 safety cap", true); return null; }
  const courseId=member.courseId, bid=member.batchId;
  const tmpl=deepClone(member);
  const numbered = oldRule.numbered || newRule.numbered;
  const baseTitle = oldRule.numbered && member.batchN
    ? tmpl.title.replace(new RegExp("\\s"+member.batchN+"$"),"") : tmpl.title;
  const members=seriesMembers(bid);
  const oldKeys=new Set(ruleOccurrences(oldRule).map(([w,d])=>w+":"+d));
  const byKey=new Map();
  members.forEach(m=>{ const k=m.week+":"+m.day; if(!byKey.has(k)) byKey.set(k,[]); byKey.get(k).push(m); });
  const usedIds=new Set();
  let n=0, added=0, removed=0, seq=1e9;
  newOcc.forEach(([w,d])=>{
    n++;
    const k=w+":"+d;
    const cand=(byKey.get(k)||[]).find(m=>!usedIds.has(m.id));
    if(cand){
      usedIds.add(cand.id);
      cand.batchN=n;
      if(numbered) cand.title=seriesTitle(baseTitle, n, newRule.numbered);
      cand.modifiedAt=nowISO();
    } else {
      added++;
      const row=newAssignment(courseId);
      fillFromTemplate(row,tmpl);
      row.title=seriesTitle(baseTitle, n, newRule.numbered);
      row.week=w; row.day=d; row.seq=seq++;
      row.batchId=bid; row.batchN=n;
      State.data.assignments.push(row);
    }
  });
  // rows on the OLD pattern but not the new one go away; rows you moved off-pattern yourself stay put
  const goners=members.filter(m=>!usedIds.has(m.id) && oldKeys.has(m.week+":"+m.day));
  removed=goners.length;
  const gonerIds=new Set(goners.map(m=>m.id));
  State.data.assignments=State.data.assignments.filter(a=>!gonerIds.has(a.id));
  seriesMembers(bid).forEach(m=>{ m.seriesRule=deepClone(newRule); });
  resequence(courseId);
  const c=courseById(courseId);
  markDirty("Series pattern changed",(c?c.name+" · ":"")+"days "+newRule.slots.join(",")+", weeks "+newRule.fromWeek+"–"+newRule.toWeek+(newRule.everyN>1?", every "+newRule.everyN+" weeks":"")+" ("+(added?"+"+added:"")+(added&&removed?" / ":"")+(removed?"−"+removed:"")+(!added&&!removed?"no change":"")+")");
  return {added, removed};
}
function deleteSeries(batchId){
  const members=seriesMembers(batchId);
  if(!members.length) return;
  if(!confirm("Delete all "+members.length+" assignments in this series? This can't be undone.")) return;
  const courseId=members[0].courseId, c=courseById(courseId);
  State.data.assignments=State.data.assignments.filter(a=>a.batchId!==batchId);
  resequence(courseId);
  State.ui.assignFormOpen=false; State.ui.editingAssignId=null;
  markDirty("Series deleted", (c?c.name+" · ":"")+members.length+" assignments");
  render();
}

/* --- 5.6 Course CSV import & export --- */
/* One interchange format (CSV_Dialect.md, v1.4): one row per assignment, course
   fields repeated, every course opening with a definition row whose Title is
   empty. Converters (lhp_convert.py and any future ones) WRITE this format
   outside the app; this importer is the app's one door in, and the exporter
   writes the very same shape back out — Excel round trips, readable backups,
   one-file sharing of owner-authored courses. */
const CSV_COLUMNS=["Course","Category","Subject","Focus","Cycle","Grade Years","Type","Parent Led","Optional",
  "Curriculum","Curriculum Revised","Weeks","Days Per Week","Frequency","Lesson Minutes","Course Links","Course Notes",
  "Seq","Week","Day","Day Number","Title","Assignment Type","Resource","Description",
  "Narration Expected","Narration Prompt","Link","Minutes","Notes"];

function importCoursesCSV(text){                 // → a plain-language summary object (never partial: taxonomy quietly ensured, one log entry)
  const rows=parseCSV(text);
  if(!rows.length || rows.length===1) throw new Error("That file looks empty — no course rows found.");
  const head=rows[0].map(h=>String(h||"").trim());
  ["Course","Title"].forEach(h=>{ if(!head.includes(h))
    throw new Error("This doesn't look like a planner course file — the “"+h+"” column is missing. (Course files are the CSVs the converter makes, or ones this app exported.)"); });
  const idx={}; head.forEach((h,i)=>{ if(!(h in idx)) idx[h]=i; });
  const get=(r,name)=>{ const i=idx[name]; return i==null ? "" : String(r[i]??"").trim(); };
  const num=v=>{ const n=parseFloat(v); return isNaN(n)?null:n; };
  const yes=v=>String(v||"").trim().toLowerCase()==="yes";

  /* group rows by course, keeping the file's course order */
  const groups=new Map(); const rowIssues=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r.length || r.every(v=>!String(v??"").trim())) continue;          // blank line
    const cname=get(r,"Course");
    if(!cname){ rowIssues.push("Row "+(i+1)+" has no course name"); continue; }
    if(!groups.has(cname)) groups.set(cname,{def:null,rows:[]});
    const g=groups.get(cname);
    if(!get(r,"Title")){ if(!g.def) g.def=r; }                            // the course-definition row (first one wins)
    else g.rows.push({r, at:i});
  }

  const summary={ coursesAdded:0, assignmentsAdded:0, courses:[], skippedCourses:[],
                  newSubjects:[], newFocuses:[], newTypes:[], newCategories:[], notes:[], rowIssues };
  /* quiet taxonomy creation — the summary reports it, one activity entry covers the import */
  const ensureCategory=name=>{ if(!name) return;
    if(!tax().categories.some(k=>k.name===name)){
      tax().categories.push({ name, color:CATEGORY_COLORS[tax().categories.length%CATEGORY_COLORS.length] });
      summary.newCategories.push(name); } };
  const ensureSubject=name=>{ if(!name) return;
    if(!taxSubject(name)){
      tax().subjects.push({ name, dept:"", focuses:[], tint:SUBJECT_TINTS[tax().subjects.length%SUBJECT_TINTS.length] });
      summary.newSubjects.push(name); } };
  const ensureFocus=(subj,focus)=>{ if(!subj || !focus) return;
    const s=taxSubject(subj); if(!s) return;
    if(!s.focuses.includes(focus)){ s.focuses.push(focus); summary.newFocuses.push(subj+" → "+focus); } };
  const ensureType=t=>{ if(!t) return;
    if(!tax().assignmentTypes.includes(t)){ tax().assignmentTypes.push(t); summary.newTypes.push(t); } };

  for(const [name,g] of groups){
    if(State.data.courses.some(c=>c.name===name)){
      summary.skippedCourses.push("“"+name+"” — a course with this name is already in your planner (the file's copy was skipped; remove yours first if you meant to re-import)");
      continue;
    }
    const d=g.def || (g.rows[0]&&g.rows[0].r);
    if(!d){ summary.skippedCourses.push("“"+name+"” — no usable rows"); continue; }
    if(!g.def) summary.notes.push("“"+name+"” had no course-definition row — its course details were read from its first assignment row.");
    const c=newCourse();
    c.name=name;
    c.category=get(d,"Category")||c.category;              ensureCategory(c.category);
    c.subject=get(d,"Subject");                            ensureSubject(c.subject);
    c.focus=g.def?get(d,"Focus"):"";                       ensureFocus(c.subject,c.focus);
    const cyc=num(get(d,"Cycle")); c.cycle=cyc?Math.round(cyc):null;
    c.gradeYears=get(d,"Grade Years");
    const t=get(d,"Type").toLowerCase(); c.type=COURSE_TYPES.some(([v])=>v===t)?t:"individual";
    if(c.type==="family") c.studentIds=[];
    c.optional=yes(get(d,"Optional"));
    c.parentLed=yes(get(d,"Parent Led"));
    c.curriculum=get(d,"Curriculum");
    c.curriculumRevised=get(d,"Curriculum Revised");
    const wk=num(get(d,"Weeks")); if(wk) c.weeks=Math.round(wk);
    const dp=num(get(d,"Days Per Week")); if(dp) c.cadence=Math.min(7,Math.max(1,Math.round(dp)));
    c.frequency=get(d,"Frequency");
    const lm=num(get(d,"Lesson Minutes")); c.lessonMinutes=lm||null;
    c.links=g.def?get(d,"Course Links").split("|").map(s=>normalizeLink(s.trim())).filter(Boolean):[];
    c.notes=g.def?[get(d,"Description"),get(d,"Course Notes")].filter(Boolean).join("\n\n"):"";
    c.role="master"; c.source="import";                    // library courses — enrollment (a later stage) hands them to children
    c.yearId=null; c.studentIds=[];                        // year & students are chosen at enrollment, not baked into the library
    c.sortPos=Math.max(0,...State.data.courses.map(x=>x.sortPos))+1;
    State.data.courses.push(c);

    /* assignments: the importer trusts Seq, not row order (sort-proof files) */
    g.rows.sort((x,y)=>{
      const sx=num(get(x.r,"Seq")), sy=num(get(y.r,"Seq"));
      return ((sx==null?1e12:sx)-(sy==null?1e12:sy)) || (x.at-y.at);
    });
    g.rows.forEach(({r},i)=>{
      const a=newAssignment(c.id);
      a.title=get(r,"Title");
      a.type=get(r,"Assignment Type")||"Assignment";       ensureType(a.type);
      const rs=get(r,"Subject"), rf=get(r,"Focus");
      if(rs && rs!==c.subject){ a.subjectOverride=rs; a.focusOverride=rf;
        ensureSubject(rs); ensureFocus(rs,rf); }
      else if(rf && rf!==c.focus){ a.focusOverride=rf; ensureFocus(c.subject||rs,rf); }
      a.resource=get(r,"Resource");
      a.description=get(r,"Description");
      a.narrationExpected=yes(get(r,"Narration Expected"));
      a.narrationPrompt=get(r,"Narration Prompt");
      a.link=normalizeLink(get(r,"Link"));
      const mn=num(get(r,"Minutes")); a.minutes=mn||null;
      a.notes=get(r,"Notes");
      const w=num(get(r,"Week")), dy=num(get(r,"Day"));
      a.week=w?Math.max(1,Math.round(w)):1;
      a.day=dy?Math.max(1,Math.round(dy)):1;
      a.seq=i+1;
      State.data.assignments.push(a);
      summary.assignmentsAdded++;
    });
    resequence(c.id);
    summary.coursesAdded++;
    summary.courses.push(name+" — "+g.rows.length+" assignment"+(g.rows.length===1?"":"s"));
  }
  if(summary.coursesAdded || summary.newSubjects.length || summary.newFocuses.length || summary.newTypes.length || summary.newCategories.length)
    markDirty("Courses imported", summary.coursesAdded+" course"+(summary.coursesAdded===1?"":"s")+" · "+summary.assignmentsAdded+" assignments"
      +(summary.skippedCourses.length?" ("+summary.skippedCourses.length+" skipped)":""));
  return summary;
}

function courseCSVRows(c){                       // one course → its definition row + one row per assignment
  const y=v=>v?"yes":"";
  const base={ "Course":c.name, "Category":c.category, "Cycle":c.cycle??"", "Grade Years":c.gradeYears||"",
    "Type":c.type, "Parent Led":y(c.parentLed), "Optional":y(c.optional),
    "Curriculum":c.curriculum||"", "Curriculum Revised":c.curriculumRevised||"",
    "Weeks":c.weeks??"", "Days Per Week":c.cadence??"", "Frequency":c.frequency||"", "Lesson Minutes":c.lessonMinutes??"" };
  const rows=[];
  rows.push(CSV_COLUMNS.map(col=>{
    if(col in base) return base[col];
    if(col==="Subject") return c.subject||"";
    if(col==="Focus") return c.focus||"";
    if(col==="Course Links") return (c.links||[]).join(" | ");
    if(col==="Course Notes") return c.notes||"";
    return "";                                             // Seq/Week/Day/Title… stay empty on the definition row
  }));
  courseAssignments(c.id).forEach(a=>{
    const eff=effectiveLabels(a,c);
    rows.push(CSV_COLUMNS.map(col=>{
      if(col in base) return base[col];
      if(col==="Subject") return eff.subject||"";
      if(col==="Focus") return eff.focus||"";
      if(col==="Seq") return a.seq;
      if(col==="Week") return a.week||"";
      if(col==="Day") return a.day||"";
      if(col==="Title") return a.title;
      if(col==="Assignment Type") return a.type||"";
      if(col==="Resource") return a.resource||"";
      if(col==="Description") return a.description||"";
      if(col==="Narration Expected") return y(a.narrationExpected);
      if(col==="Narration Prompt") return a.narrationPrompt||"";
      if(col==="Link") return a.link||"";
      if(col==="Minutes") return a.minutes??"";
      if(col==="Notes") return a.notes||"";
      return "";                                           // Course Links / Course Notes / Day Number ride only where they belong
    }));
  });
  return rows;
}
function exportCoursesCSV(courses, label){       // label: what to call the file — a course name, or "all courses"
  if(!courses.length){ toast("Nothing to export yet", true); return; }
  const rows=[CSV_COLUMNS.slice()];
  courses.forEach(c=>courseCSVRows(c).forEach(r=>rows.push(r)));
  const fname=(label||"courses").replace(/[^\w\- ]+/g,"").trim().replace(/\s+/g,"_").slice(0,60)||"courses";
  download(fname+".csv", toCSV(rows), "text/csv");
  logActivity("Courses exported to CSV", courses.length+" course"+(courses.length===1?"":"s")+" → "+fname+".csv"); scheduleSave();
  toast(State.storage.mode==="browser"
    ? "Choose “Save to Files” to keep the CSV — it opens in Excel or Numbers"
    : "Exported "+fname+".csv — it opens in Excel by double-click");
}

let lastViewKey=null;
function viewKey(){ const u=State.ui; return [u.screen, u.selectedCourseId||"", u.colorsOpen?1:0].join("|"); }
function render(){
  const sameView = viewKey()===lastViewKey;

    el("div",{class:"bp-row"},
      el("div",{},
        el("div",{class:"bp-title"},"Homeschool Planner")))));   // save state & version live on Data & Backups (v0.3.0)
  if(!State.data){ app.append(renderSetup()); lastViewKey=viewKey(); return; }

    tabs.map(([id,label])=>el("button",{class:State.ui.screen===id?"active":"", onclick:()=>{State.ui.screen=id;State.ui.colorsOpen=false;render();}},label))));
  app.append({home:renderHome, courses:renderCourses, people:renderPeople, year:renderYears, data:renderData}[State.ui.screen]());
  const modal=currentModal();                     // every add/edit form floats above its page — locked build preference
  if(modal) app.append(el("div",{class:"overlay"}, el("div",{class:"modal"}, modal)));
  document.body.style.overflow = modal ? "hidden" : "";   // freeze the page behind an open pop-up (also steadies iPad date pickers)
  lastViewKey=viewKey();

/* Subject/Focus pickers with create-new-inline (v5: “searchable dropdowns
   with create-new-inline everywhere”). Choosing “＋ Add new…” swaps in a
   small name box right here — no pop-up dialogs — and the new entry is
   selected and confirmed with a toast the moment it's added. */
function subjectFocusPickers(obj, subjKey, focusKey, inheritCourse){
  const NEW="__new__";
  const subjWrap=el("div",{}), focusWrap=el("div",{});
  function inlineAdder(placeholder, onAdd, onCancel){
    const inp=el("input",{type:"text",placeholder});
    const row=el("div",{class:"row",style:"margin-top:6px"},
      el("div",{style:"flex:1;min-width:150px"},inp),
      el("button",{class:"btn secondary small",onclick:()=>onAdd(inp.value)},"Add"),
      el("button",{class:"btn quiet small",onclick:onCancel},"Cancel"));
    setTimeout(()=>inp.focus(),0);
    return row;
  }
  function buildSubj(){
    clear(subjWrap);
    const sel=el("select",{});
    sel.append(el("option",{value:"",selected:!obj[subjKey]},
      inheritCourse ? "Inherit from course"+(inheritCourse.subject?" ("+inheritCourse.subject+")":"") : "— no subject —"));
    tax().subjects.slice().sort((a,b)=>a.name.localeCompare(b.name))   // dropdowns read alphabetically (owner round 7)
      .forEach(s=>sel.append(el("option",{value:s.name,selected:obj[subjKey]===s.name},s.name)));
    sel.append(el("option",{value:NEW},"＋ Add a subject not in this list…"));
    sel.addEventListener("change",()=>{
      if(sel.value===NEW){
        subjWrap.append(inlineAdder("New subject name (e.g. Logic)",
          val=>{ const name=addTaxSubject(val);
            if(!name){ toast("Please type a name for the new subject", true); return; }
            obj[subjKey]=name; obj[focusKey]="";
            toast("“"+name+"” added to your Subjects — it's available on every course and assignment now");
            buildSubj(); buildFocus(); },
          ()=>{ buildSubj(); }));
        sel.disabled=true;
      } else { obj[subjKey]=sel.value; obj[focusKey]=""; buildFocus(); }
    });
    subjWrap.append(sel);
  }
  function buildFocus(){
    clear(focusWrap);
    const sel=el("select",{});
    const effSubj = obj[subjKey] || (inheritCourse ? inheritCourse.subject : "");
    sel.append(el("option",{value:"",selected:!obj[focusKey]},
      inheritCourse && !obj[subjKey] ? "Inherit from course"+(inheritCourse.focus?" ("+inheritCourse.focus+")":"") : "— no focus —"));
    focusesFor(effSubj).slice().sort((a,b)=>a.localeCompare(b))
      .forEach(f=>sel.append(el("option",{value:f,selected:obj[focusKey]===f},f)));
    if(effSubj) sel.append(el("option",{value:NEW},"＋ Add a focus not in this list…"));
    sel.addEventListener("change",()=>{
      if(sel.value===NEW){
        focusWrap.append(inlineAdder("New focus under "+effSubj,
          val=>{ const name=addTaxFocus(effSubj, val);
            if(!name){ toast("Please type a name for the new focus", true); return; }
            obj[focusKey]=name;
            toast("“"+name+"” added under "+effSubj);
            buildFocus(); },
          ()=>{ buildFocus(); }));
        sel.disabled=true;
      } else obj[focusKey]=sel.value;
    });
    focusWrap.append(sel);
  }
  buildSubj(); buildFocus();
  return { subjSel:subjWrap, focusSel:focusWrap };
}
