function assignmentForm(course, existing){
  const a = existing ? deepClone(existing) : newAssignment(course.id);
  const inSeries = existing && existing.batchId;
  const members = inSeries ? seriesMembers(existing.batchId) : [];
  const rule = inSeries ? existing.seriesRule : null;
  const width=dpw(course), courseWeeks=course.weeks||weeksOf(course);
  const last=courseAssignments(course.id).slice(-1)[0];
  const mode={ kind:"single", scope:"one" };
  const rec= rule ? deepClone(rule)
    : { slots:Array.from({length:width},(_,k)=>k+1), fromWeek:1, toWeek:courseWeeks, everyN:1, numbered:false };
  const pos={ week: existing?existing.week:(last?last.week:1), day: existing?existing.day:(last?last.day:1) };

  const card=el("div",{class:"card"}, el("h3",{}, existing?("Edit assignment — Week "+existing.week+", Day "+existing.day):"Add an assignment"));

  /* shared fields */
  const titleIn=el("input",{type:"text",value:a.title,placeholder:"e.g. Piano Practice — or Little House, Ch. 1",oninput:e=>a.title=e.target.value});
  const typeSel=el("select",{onchange:e=>a.type=e.target.value},
    tax().assignmentTypes.map(t=>el("option",{value:t,selected:a.type===t},t)));
  const descIn=el("textarea",{placeholder:"Description (optional)",oninput:e=>a.description=e.target.value},a.description);
  const promptIn=el("input",{type:"text",value:a.narrationPrompt,placeholder:"e.g. Tell me about Sally's big brass kettle",
    oninput:e=>{a.narrationPrompt=e.target.value; if(e.target.value){a.narrationExpected=true; narrChk.checked=true;}}});
  const narrChk=el("input",{type:"checkbox",checked:a.narrationExpected,onchange:e=>a.narrationExpected=e.target.checked});
  const linkIn=el("input",{type:"text",value:a.link,placeholder:"www.example.com or https://…",oninput:e=>a.link=e.target.value});
  const resIn=el("input",{type:"text",value:a.resource||"",placeholder:"e.g. Long Story Short",oninput:e=>a.resource=e.target.value});
  const minIn=el("input",{type:"number",min:"1",value:a.minutes??"",placeholder:"e.g. 20",onchange:e=>a.minutes=e.target.value?Number(e.target.value):null});
  const {subjSel,focusSel}=subjectFocusPickers(a,"subjectOverride","focusOverride",course);
  const tagsIn=el("input",{type:"text",value:a.tags.join(", "),placeholder:"comma, separated, tags",
    oninput:e=>a.tags=e.target.value.split(",").map(x=>x.trim()).filter(Boolean)});
  const notesIn=el("textarea",{placeholder:"Notes (optional)",oninput:e=>a.notes=e.target.value},a.notes);

  const weekIn=el("input",{type:"number",min:"1",value:pos.week,onchange:e=>pos.week=Number(e.target.value)||1});
  const daySel=el("select",{onchange:e=>pos.day=Number(e.target.value)},
    Array.from({length:width},(_,k)=>el("option",{value:k+1,selected:pos.day===k+1},"Day "+(k+1))));
  const courseMoveSel = existing ? el("select",{},
    coursesAll().slice().sort((a,b)=>a.name.localeCompare(b.name))
      .map(cc=>el("option",{value:cc.id,selected:cc.id===course.id},cc.name+" — "+cc.category))) : null;

  /* recurring controls (create mode + make-recurring) */
  function recControls(){
    const slotsRow=el("div",{class:"weekday-row"});
    Array.from({length:width},(_,k)=>k+1).forEach(d=>{
      const on=rec.slots.includes(d);
      const lab=el("label",{class:on?"on":""},
        el("input",{type:"checkbox",checked:on,onchange:e=>{
          if(e.target.checked){ if(!rec.slots.includes(d)) rec.slots.push(d); lab.classList.add("on"); }
          else { rec.slots=rec.slots.filter(x=>x!==d); lab.classList.remove("on"); }
        }}),"Day "+d);
      slotsRow.append(lab);
    });
    const fromIn=el("input",{type:"number",min:"1",value:rec.fromWeek,onchange:e=>rec.fromWeek=Number(e.target.value)||1});
    const toIn=el("input",{type:"number",min:"1",value:rec.toWeek,onchange:e=>rec.toWeek=Number(e.target.value)||1});
    const everySel=el("select",{onchange:e=>rec.everyN=Number(e.target.value)},
      [1,2,3,4].map(n=>el("option",{value:n,selected:rec.everyN===n},n===1?"Every week":"Every "+n+" weeks")));
    const numChk=el("input",{type:"checkbox",checked:rec.numbered,onchange:e=>rec.numbered=e.target.checked});
    return el("div",{class:"stack"},
      el("label",{class:"field"},"Repeat on",slotsRow),
      el("div",{class:"grid2"},
        el("label",{class:"field"},"From week",fromIn),
        el("label",{class:"field"},"Through week",toIn),
        el("label",{class:"field"},"Repeat every",everySel),
        el("label",{class:"row",style:"font-size:14px;font-weight:600;gap:8px;cursor:pointer;align-self:end"},numChk,"Number the titles (1, 2, 3…)")),
      el("p",{class:"li-sub"},"Numbering is only for content that advances — Chapter 1, Chapter 2… For work like piano practice, leave it off and every occurrence keeps the same title. (Typing {n} in the title still works for patterns like “Lesson {n}”.)"));
  }

  /* create mode: single vs recurring toggle */
  let kindRow=null, singlePos=null, recBox=null;
  if(!existing){
    const mk=(val,label)=>{
      const r=el("input",{type:"radio",name:"kind",checked:mode.kind===val,onchange:()=>{mode.kind=val;
        singlePos.style.display=val==="single"?"":"none"; recBox.style.display=val==="recurring"?"":"none";}});
      return el("label",{class:"row",style:"font-size:14.5px;font-weight:600;gap:8px;cursor:pointer"},r,label);
    };
    kindRow=el("div",{class:"row",style:"gap:22px"},mk("single","Single assignment"),mk("recurring","Recurring assignment"));
    singlePos=el("div",{class:"grid2"},
      el("label",{class:"field"},"Week",weekIn),
      el("label",{class:"field"},"Day",daySel));
    recBox=recControls(); recBox.style.display="none";
  }

  /* edit mode: series tools */
  let scopeRow=null, seriesBox=null;
  if(existing){
    if(inSeries){
      const mkScope=(val,label)=>{
        const r=el("input",{type:"radio",name:"scope",checked:mode.scope===val,onchange:()=>mode.scope=val});
        return el("label",{class:"row",style:"font-size:14px;font-weight:600;gap:8px;cursor:pointer"},r,label);
      };
      scopeRow=el("div",{class:"notice",style:"margin-bottom:0"},
        el("div",{class:"row",style:"gap:20px"},
          el("span",{style:"font-weight:600"},"This is one of "+members.length+" in a recurring series. Save changes to:"),
          mkScope("one","Only this one"),
          mkScope("all","All "+members.length)),
        el("p",{class:"li-sub",style:"margin-top:6px"},"“All” works like a header: whatever you change here — link, description, prompt, type, even the title — flows to every assignment in the series. Week/Day placement always moves only this one."));
    }
    seriesBox=el("div",{class:"stack",style:"margin-top:10px"});
    if(inSeries && rule){
      seriesBox.append(el("details",{class:"adv"},
        el("summary",{},"Repeating pattern — currently "+[...rule.slots].sort((x,y)=>x-y).map(d=>"Day "+d).join(", ")+", "+(rule.everyN===1?"every week":"every "+rule.everyN+" weeks")+", weeks "+rule.fromWeek+"–"+rule.toWeek),
        el("div",{class:"stack",style:"margin-top:10px"},
          el("p",{class:"li-sub"},"Change when and how this series repeats — fewer days, different weeks, a different rhythm — and it applies when you press Save, together with everything else you've edited here. Assignments already sitting on the new pattern are kept exactly as they are (including any individual edits); the rest of the old pattern is removed; new spots are filled from this assignment's fields. Rows you've moved off the pattern yourself stay put."+(rule.numbered?" Numbered titles are recomputed 1, 2, 3… in the new order.":"")),
          recControls())));
    }
    if(inSeries){
      seriesBox.append(el("div",{class:"row"},
        el("button",{class:"btn danger small",onclick:()=>deleteSeries(existing.batchId)},"Delete the whole series ("+members.length+")")));
    } else {
      const rc=recControls();
      seriesBox.append(el("details",{class:"adv"},
        el("summary",{},"Make this recurring…"),
        el("div",{class:"stack",style:"margin-top:10px"},
          el("p",{class:"li-sub"},"Turns this assignment into a repeating one. It keeps its Week "+existing.week+", Day "+existing.day+" slot; the rule fills in the rest. Save any field edits first."),
          rc,
          el("div",{class:"row"},el("button",{class:"btn secondary small",onclick:()=>{
            const made=convertToRecurring(existing, rec);
            if(made>0){ State.ui.assignFormOpen=false; State.ui.editingAssignId=null; render(); toast(made+" occurrences added"); }
          }},"Create the repeats")))));
    }
  }

  card.append(el("div",{class:"stack"},
    kindRow,
    el("div",{class:"grid2"},
      el("label",{class:"field"},"Title",titleIn),
      el("label",{class:"field"},"Type",typeSel)),
    existing?el("div",{class:"grid2"},
      el("label",{class:"field"},el("div",{},"Week ",el("span",{class:"hint"},"moves only this one")),weekIn),
      el("label",{class:"field"},"Day",daySel)):null,
    existing?el("label",{class:"field"},
      el("div",{},"Course ",el("span",{class:"hint"},inSeries
        ?"filed in the wrong place? Changing it moves the whole series ("+members.length+")"
        :"filed in the wrong place? Changing it moves this assignment, Week/Day spot and all")),
      courseMoveSel):null,
    singlePos, recBox,
    el("label",{class:"field"},"Description",descIn),
    el("div",{class:"grid2"},
      el("label",{class:"field"},el("div",{},"Resource ",el("span",{class:"hint"},"the book or material it uses")),resIn),
      el("label",{class:"field"},"Resource link",linkIn)),
    el("label",{class:"field"},el("div",{},"Narration prompt ",el("span",{class:"hint"},"the question you'll ask")),promptIn),
    el("label",{class:"row",style:"font-size:14px;font-weight:600;gap:8px;cursor:pointer"},narrChk,"Narration expected on this assignment"),
    el("details",{class:"adv",open:!!(a.subjectOverride||a.focusOverride||a.tags.length||a.notes||a.minutes)},
      el("summary",{},"Advanced — subject/focus override, time, tags, notes"),
      el("div",{class:"stack",style:"margin-top:10px"},
        el("p",{class:"li-sub"},"Only set these when this assignment genuinely differs from its course — e.g. a Together Time catechism row landing under Bible → Catechism & Creeds."),
        el("div",{class:"grid2"},
          el("label",{class:"field"},"Subject override",subjSel),
          el("label",{class:"field"},"Focus override",focusSel),
          el("label",{class:"field"},"Time estimate (minutes)",minIn),
          el("label",{class:"field"},"Tags",tagsIn)),
        el("label",{class:"field"},"Notes",notesIn))),
    scopeRow, seriesBox,
    el("div",{class:"row"},
      el("button",{class:"btn",onclick:()=>{
        a.title=a.title.trim();
        if(!a.title){ toast("Please give it a title", true); return; }
        const normRule=r=>JSON.stringify({slots:[...new Set(r.slots)].filter(d=>d>=1).sort((x,y)=>x-y),
          fromWeek:Math.max(1,Math.floor(r.fromWeek)||1),toWeek:Math.max(1,Math.floor(r.toWeek)||1),
          everyN:Math.max(1,Math.floor(r.everyN)||1),numbered:!!r.numbered});
        const patternChanged = inSeries && rule && normRule(rec)!==normRule(rule);
        if(patternChanged){                                   // validate BEFORE any edits land, so the form stays open on a mistake
          if(!rec.slots.length){ toast("Pick at least one day of the week to repeat on", true); return; }
          if(rec.toWeek<rec.fromWeek){ toast("“Through week” can't be before “from week”", true); return; }
          if(ruleOccurrences(JSON.parse(normRule(rec))).length>1000){ toast("That's over the 1,000-assignment safety cap", true); return; }
        }
        if(existing){
          if(inSeries && mode.scope==="all"){
            applySeriesEdits(existing, a);
            placeAt(existing, pos.week, pos.day);
          } else {
            Object.assign(existing,{title:a.title,description:a.description,type:a.type,
              subjectOverride:a.subjectOverride,focusOverride:a.focusOverride,resource:a.resource,
              link:normalizeLink(a.link),minutes:a.minutes,
              tags:[...a.tags],notes:a.notes,narrationExpected:a.narrationExpected,narrationPrompt:a.narrationPrompt});
            placeAt(existing, pos.week, pos.day);
            if(!saveAssignment(existing,false)) return;
          }
          if(patternChanged){                                 // field edits first, then the reshape fills new spots from them
            const res=reshapeSeries(existing, rec);
            if(res && (res.added||res.removed))
              toast("Pattern updated — "+(res.added?res.added+" added":"")+(res.added&&res.removed?", ":"")+(res.removed?res.removed+" removed":""));
          }
          if(courseMoveSel && courseMoveSel.value && courseMoveSel.value!==existing.courseId){
            const moved=moveAssignmentToCourse(existing, courseMoveSel.value);
            if(moved) toast(moved>1 ? "Series moved — "+moved+" assignments now live in their new course" : "Moved to its new course");
          }
        } else if(mode.kind==="single"){
          createSingle(course.id, a, pos.week, pos.day);
        } else {
          const n=createRecurring(course.id, a, rec);
          if(!n) return;
          toast(n+" assignments created");
        }
        State.ui.assignFormOpen=false; State.ui.editingAssignId=null; render();
      }}, existing?"Save changes":"Add"),
      el("button",{class:"btn quiet",onclick:()=>{State.ui.assignFormOpen=false;State.ui.editingAssignId=null;render();}},"Cancel"))));
  return card;
}

  const endIn=dateInput({value:y.endDate,onchange:e=>y.endDate=e.target.value});
  const cycleSel=el("select",{onchange:e=>y.cycle=Number(e.target.value)},CYCLES.map(c=>el("option",{value:c,selected:y.cycle===c},"Cycle "+c)));
  const varSel=el("select",{onchange:e=>y.ttVariant=e.target.value},TT_VARIANTS.map(v=>el("option",{value:v,selected:y.ttVariant===v},"Variant "+v+(v==="A"?" (first pass)":" (second pass)"))));
  const targetIn=el("input",{type:"number",min:"1",value:y.targetDays,onchange:e=>y.targetDays=Number(e.target.value)||DEFAULTS.targetDays});

  /* grade levels — mutates the clone; saved with the year */
  const gradesBox=el("div",{},el("div",{class:"eyebrow",style:"margin-bottom:6px"},"Grade levels this year"));
  if(!students().length) gradesBox.append(el("div",{class:"li-sub"},"Add students on the Students tab first."));
  else students().forEach(st=>{
    gradesBox.append(el("div",{class:"row",style:"gap:10px;padding:3px 0;align-items:center;flex-wrap:nowrap"},
      kidCircle(st),
      el("span",{style:"font-size:14px;min-width:90px;flex:1"},st.name),
      el("select",{style:"max-width:170px;flex:none",onchange:e=>setGrade(y,st.id,e.target.value,true)},   // compact, beside the name (owner round 6)
        el("option",{value:"",selected:!y.studentGrades[st.id]},"— not in this year —"),
        GRADE_LEVELS.map(g=>el("option",{value:g,selected:y.studentGrades[st.id]===g},g)))));
  });

  /* breaks & terms — self-contained editors on the clone (repaint locally, never a global render) */
  function blocksBox(kind,title,placeholder){
    const box=el("div",{});
    function paint(){
      clear(box);
      box.append(el("div",{class:"eyebrow",style:"margin-bottom:6px"},title));
      y[kind].forEach(b=>box.append(el("div",{class:"list-item"},
        el("div",{class:"li-main"},el("div",{class:"li-name"},b.name),el("div",{class:"li-sub"},fmtDate(b.start)+" – "+fmtDate(b.end))),
        iconBtn("trash",()=>{removeDateBlock(y,kind,b.id,true);paint();},"Remove "+b.name,{danger:true}))));
      if(!y[kind].length) box.append(el("div",{class:"li-sub",style:"padding:4px 0 8px"},"None yet"));
      const nameIn=el("input",{type:"text",placeholder}), sIn=dateInput({class:"compact-date"}), eIn=dateInput({class:"compact-date"});
      box.append(el("div",{class:"row",style:"margin-top:6px;align-items:flex-end"},   // labeled + compact dates (owner round 7, iPad)
        el("div",{style:"flex:2;min-width:140px"},el("div",{class:"mini-label"},"Name"),nameIn),
        el("div",{style:"flex:none"},el("div",{class:"mini-label"},"First day"),sIn),
        el("div",{style:"flex:none"},el("div",{class:"mini-label"},"Last day"),eIn),
        el("button",{class:"btn secondary small",onclick:()=>{ if(addDateBlock(y,kind,nameIn.value,sIn.value,eIn.value,true)) paint(); }},"Add")));
    }
    paint(); return box;
  }

  card.append(el("div",{class:"stack"},
    el("div",{class:"grid2"},
      el("label",{class:"field"},"Label",labelIn),
      el("label",{class:"field"},"Target school days ",targetIn),
      el("label",{class:"field"},"First day",startIn),
      el("label",{class:"field"},"Last day",endIn),
      el("label",{class:"field"},"Curriculum cycle",cycleSel),
      el("label",{class:"field"},"Together Time variant",varSel)),
    el("label",{class:"field"},el("div",{},"School days of the week ", el("span",{class:"hint"},"used only to place work on the calendar — skipping a day is always one tap later")), weekdayPicker(y,true)),
    gradesBox,
    blocksBox("breaks","Breaks & vacations","e.g. Christmas Break"),
    blocksBox("terms","Terms — optional","e.g. Term 1"),
    el("div",{class:"row"},
      el("button",{class:"btn",onclick:()=>{
        if(existing){
          const fields={label:y.label,startDate:y.startDate,endDate:y.endDate,cycle:y.cycle,ttVariant:y.ttVariant,
            targetDays:y.targetDays,weekdayPattern:[...y.weekdayPattern],
            studentGrades:deepClone(y.studentGrades),breaks:deepClone(y.breaks),terms:deepClone(y.terms)};
          const before=deepClone(existing); Object.assign(existing,fields);
          if(!saveYear(existing,false)){ Object.assign(existing,before); return; }
        } else if(!saveYear(y,true)) return;
        State.ui.yearFormOpen=false; State.ui.editingYearId=null;
        if(!existing) State.ui.selectedYearId=y.id;
        render();
      }}, existing?"Save changes":"Create year"),
      el("button",{class:"btn quiet",onclick:()=>{State.ui.yearFormOpen=false;State.ui.editingYearId=null;render();}},"Cancel"))));
  return card;
}
function weekdayPicker(y, silent){               // silent: editing a form clone — the Save button does the touching
  const row=el("div",{class:"weekday-row"});
  WEEKDAY_NAMES.forEach((name,i)=>{
    const on=y.weekdayPattern.includes(i);
    const lab=el("label",{class:on?"on":""},
      el("input",{type:"checkbox",checked:on,onchange:e=>{
        if(e.target.checked){ if(!y.weekdayPattern.includes(i)) y.weekdayPattern.push(i); lab.classList.add("on"); }
        else { y.weekdayPattern=y.weekdayPattern.filter(d=>d!==i); lab.classList.remove("on"); }
        y.weekdayPattern.sort();
        if(!silent && y.id && State.data.schoolYears.some(x=>x.id===y.id)) touchYear(y,"Weekday pattern changed",y.label);
      }}), name);
    row.append(lab);
  });
  return row;
}
/* --- 6.7 Data & Backups screen --- */
function renderData(){
  const wrap=el("div",{});
  wrap.append(el("h2",{class:"screen-title"},"Data & Backups"),
    el("p",{class:"screen-note"},"Your records live in one JSON file you own. Backups are automatic; restore is one tap."));
  const s=State.storage;
  const info=el("div",{class:"card"},el("h3",{},"This device"));
  info.append(
    el("div",{class:"kv"},el("b",{},"Mode"),el("span",{}, s.mode==="folder" ? "Folder — saving automatically to “"+esc(s.dirHandle?.name||"?")+"”" : "Browser — changes kept on this device; save a copy to Files below")),
    el("div",{class:"kv"},el("b",{},"Last saved"),el("span",{id:"lastSavedVal"},s.lastSavedAt?fmtTime(s.lastSavedAt):"—")),
    el("div",{class:"kv"},el("b",{},"Data file"),el("span",{class:"mono"},APP.dataFileName+" · schema v"+State.data.schemaVersion)),
    el("div",{class:"kv"},el("b",{},"App version"),el("span",{class:"mono"},"v"+APP.version+" · "+APP.stage)),
    el("div",{class:"row",style:"margin-top:10px"},
      s.mode==="folder"?el("button",{class:"btn secondary small",onclick:()=>saveNow(true)},"Save now"):null,
      el("button",{class:"btn secondary small",onclick:exportJSON}, s.mode==="browser"?"Save a copy to Files":"Export a copy"),
      s.mode==="browser"?el("button",{class:"btn secondary small",onclick:exportDatedBackup},"Save a dated backup"):null,
      s.mode!=="folder"&&folderCapable()?el("button",{class:"btn quiet small",onclick:chooseFolder},"Switch to folder mode"):null));
  wrap.append(info);

  if(s.mode==="browser") wrap.append(el("div",{class:"notice warn"},"On iPad and iPhone: your work is kept on this device automatically as you go — no save button needed. At the end of a session, tap “Save a copy to Files” and replace planner-data.json in your planner folder. “Save a dated backup” makes a timestamped snapshot to drop into your backups/ folder — the manual twin of the Mac's automatic ones."));

  const bak=el("div",{class:"card"},el("h3",{},"Backups"));
  const listBox=el("div",{}); bak.append(listBox);
  renderBackupList(listBox);
  wrap.append(bak);

  const load=el("div",{class:"card"},el("h3",{},"Load a data file"),
    el("p",{class:"screen-note"},"Replace what's open with a planner-data.json or an exported copy — for moving between devices or recovering from an export."),
    filePickButton("Load a file…"));
  wrap.append(load);

  const log=el("div",{class:"card"},el("h3",{},"Recent activity"));
  const entries=State.data.activityLog.slice(0,40);
  if(!entries.length) log.append(el("div",{class:"empty"},"Nothing yet."));
  entries.forEach(a=>log.append(el("div",{class:"list-item"},
    el("div",{class:"li-main"},el("div",{class:"li-name",style:"font-weight:500"},a.what),
      a.detail?el("div",{class:"li-sub"},a.detail):null),
    el("div",{class:"li-sub mono"},fmtTime(a.at)))));
  wrap.append(log);
  return wrap;
}
async function renderBackupList(box){
  clear(box);
  try{
  if(State.storage.mode==="folder"){
    const backups=await listFolderBackups();
    if(!backups.length){ box.append(el("div",{class:"empty"},"No backups yet — one is written every time the app saves.")); return; }
    box.append(el("p",{class:"li-sub",style:"margin-bottom:6px"},backups.length+" snapshots in backups/ (newest 30 kept, plus one per month)"));
    backups.slice(0,12).forEach(b=>{
      const label=b.name.replace("backup_","").replace(".json","").replace("_"," at ");
      box.append(el("div",{class:"list-item"},
        el("div",{class:"li-main mono"},label),
        el("button",{class:"btn quiet small",onclick:()=>restoreFromBackup({handle:b.handle,label})},"Restore")));
    });
  } else {
    const baks=JSON.parse(store.get(LS_BAK)||"[]");
    if(!baks.length){ box.append(el("div",{class:"empty"},"No backups yet — rolling snapshots are kept on this device as you work.")); return; }
    baks.forEach(b=>{
      const label=fmtTime(new Date(b.at).toISOString());
      box.append(el("div",{class:"list-item"},
        el("div",{class:"li-main mono"},label),
        el("button",{class:"btn quiet small",onclick:()=>restoreFromBackup({data:b.data,label})},"Restore")));
    });
  }
  }catch(e){ box.append(el("div",{class:"empty"},"Backups couldn't be listed: "+e.message)); }
}

/* ================================================================
   SECTION 7 — BOOT
   Decide storage mode, restore what we can, first render.
   ================================================================ */
(async function boot(){
  try{
    if(folderCapable()){
      const saved = await idb.get("dirHandle").catch(()=>null);
      if(saved && await permissionOK(saved,false)){        // silent reconnect if already granted
        State.storage.dirHandle=saved;
        try{ await loadFromFolder(); }catch(e){ console.warn("Auto-load failed",e); State.data=null; }
      }
    } else {
      try{ loadFromBrowser(); }catch(e){ console.warn("Browser data unreadable",e); State.data=null; }
    }
  } finally {
    if(State.data && State.storage.mode) State.ui.screen="home"; 
    render();
  }
})();
window.addEventListener("beforeunload",e=>{ if(State.dirty){ saveNow(false); } });

/* Hosted copies (https, e.g. GitHub Pages) also work offline after the first
   visit: a small companion file, sw.js, caches the app on the device. On the
   Mac's local file this does nothing — the local file needs no caching. */
if(location.protocol==="https:" && "serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{/* sw.js not present — fine */});
}
</script>
